<!DOCTYPE html><html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TRON FOREX – Envelope System</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/lightweight-charts/4.1.3/lightweight-charts.standalone.production.js"></script>
<style>
body{margin:0;background:#050a0e;color:#c8e0f0;font-family:Arial}
header{padding:10px;text-align:center}
select{background:#0a1520;color:#00d4ff;border:1px solid #1a3a5c;padding:6px}
#stats{display:flex;gap:10px;justify-content:center;margin:10px}
.card{background:#0a1520;border:1px solid #1a3a5c;padding:10px;border-radius:6px}
#signal{font-size:24px;text-align:center;margin:10px}
#chart{height:400px}
</style>
</head>
<body>
<header>
<h2>TRON / FOREX – BTCUSDT</h2>
<select id="tf">
<option value="1m">M1</option>
<option value="3m">M3</option>
<option value="5m">M5</option>
<option value="15m">M15</option>
<option value="30m">M30</option>
<option value="1h">H1</option>
<option value="4h">H4</option>
<option value="1d">D1</option>
</select>
</header><div id="stats">
<div class="card">Preço<br><span id="price">—</span></div>
<div class="card">MA14<br><span id="ma">—</span></div>
<div class="card">Upper<br><span id="upper">—</span></div>
<div class="card">Lower<br><span id="lower">—</span></div>
<div class="card">RSI<br><span id="rsi">—</span></div>
</div><div id="signal">AGUARDANDO</div>
<div id="chart"></div><script>
const API = "http://SEU_BACKEND:5000/data/";

const chart = LightweightCharts.createChart(document.getElementById('chart'),{
  layout:{background:{color:'#050a0e'},textColor:'#4a7090'},
  grid:{vertLines:{color:'#0f1e2e'},horzLines:{color:'#0f1e2e'}},
  width:window.innerWidth,
  height:400
});

const candle = chart.addCandlestickSeries();
const maLine = chart.addLineSeries({color:'#00d4ff'});
const upLine = chart.addLineSeries({color:'#ff3d6b',lineStyle:2});
const lowLine = chart.addLineSeries({color:'#00ff9d',lineStyle:2});

async function update(){
  const tf = document.getElementById('tf').value;
  const res = await fetch(API+tf);
  const d = await res.json();

  document.getElementById('price').innerText = d.price.toFixed(2);
  document.getElementById('ma').innerText = d.ma.toFixed(2);
  document.getElementById('upper').innerText = d.upper.toFixed(2);
  document.getElementById('lower').innerText = d.lower.toFixed(2);
  document.getElementById('rsi').innerText = d.rsi.toFixed(1);

  if(d.price >= d.upper) document.getElementById('signal').innerText = 'SELL';
  else if(d.price <= d.lower) document.getElementById('signal').innerText = 'BUY';
  else document.getElementById('signal').innerText = 'SEM SINAL';
}

setInterval(update,60000);
update();
</script></body>
</html>
